name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # Prisma is imported at build time; URL is not used to connect during `next build`.
      DATABASE_URL: postgresql://ci:ci@127.0.0.1:5432/ci?schema=public
      NEXTAUTH_SECRET: ci-placeholder-secret-min-32-chars-ok
      NEXTAUTH_URL: http://localhost:3000
      ADMIN_PASSWORD: ci-admin-placeholder
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run build
